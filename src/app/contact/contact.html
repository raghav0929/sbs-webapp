<section class="contact" id="contact">
  <div class="container">
    <div class="section-tag">Reach Us</div>
    <h2 class="section-title">Contact &amp; Apply</h2>

    <div class="contact-grid">

      <!-- Left: contact info -->
      <div class="contact-info">
        @for (item of contactItems; track item) {
          <div class="contact-item">
            <div class="contact-icon">{{ item.icon }}</div>
            <div>
              <h4>{{ item.label }}</h4>
              <p [innerHTML]="item.text"></p>
            </div>
          </div>
        }
      </div>

      <!-- Right: application form -->
      <div class="contact-form">
        <h3>Apply for a Course</h3>

        <div class="form-group">
          <label>Full Name</label>
          <input
            type="text"
            [value]="form.name"
            (input)="form.name = $any($event.target).value"
            placeholder="Your full name"
          />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input
            type="tel"
            [value]="form.phone"
            (input)="form.phone = $any($event.target).value"
            placeholder="+91 XXXXX XXXXX"
          />
        </div>

        <div class="form-group">
          <label>Select Course</label>
          <select
            [value]="form.course"
            (change)="form.course = $any($event.target).value"
          >
            @for (c of courseOptions; track c) {
              <option [value]="c">{{ c }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label>Message (Optional)</label>
          <textarea
            [value]="form.message"
            (input)="form.message = $any($event.target).value"
            placeholder="Any questions or details..."
          ></textarea>
        </div>

        <button class="btn-submit" (click)="onSubmit()">
          Submit Application
        </button>

        @if (submitted) {
          <p class="success-msg">
            ✅ Application submitted! We will contact you soon.
          </p>
        }

      </div>

    </div>
  </div>
</section>
